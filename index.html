<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3mad</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Header Section -->
  <header class="header">
    <div class="logo">3mad</div>
    <nav class="menu">
      <a href="#home">Home</a>
      <a href="#about">About</a>
      <a href="#categories">Categories</a>
      <a href="#contact">Contact</a>
    </nav>
    <div class="search-bar">
      <input type="text" placeholder="Search..." id="search-input">
    </div>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <a href="https://example.com" target="_blank">
      <img src="hero-image.jpg" alt="Clickable Hero Image">
    </a>
  </section>

  <!-- Categories Section -->
  <section class="categories">
    <div class="category" onclick="navigateTo('shoes')">
      <span>👟 Shoes</span>
    </div>
    <div class="category" onclick="navigateTo('skincare')">
      <span>💄 Skin Care</span>
    </div>
    <div class="category" onclick="navigateTo('books')">
      <span>📚 Books</span>
    </div>
    <div class="category coming-soon">
      <span>🚀 Coming Soon</span>
    </div>
  </section>

  <!-- Footer Section -->
  <footer class="footer">
    <div class="contact">
      <p>Email: <a href="mailto:contact@3mad.com">contact@3mad.com</a></p>
      <p>Phone: +123-456-7890</p>
    </div>
    <div class="social">
      <a href="#" class="social-icon">Facebook</a>
      <a href="#" class="social-icon">Twitter</a>
      <a href="#" class="social-icon">Instagram</a>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
